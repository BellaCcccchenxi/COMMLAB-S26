<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>围着篝火跳舞的文字</title>
  <style>
    body{
    animation: myColor 20s infinite alternate;
    margin:0;
    padding:0;}

    @keyframes myColor{
        from{
        background-color: black;
    }
    to{
        background-color: #DDC091;
    }
}
    .campfire {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 80%;
      background: linear-gradient(45deg, #ff9a00, #ff3d00, #ff0000);
      animation: fire-flicker 1s infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }

    .dancer {
      position: absolute;
      font-size: 16px;
      color: #333;
      transition: all 0.3s ease;
    }

    .dancer-1 { top: 10%; left: 50%; transform: translateX(-50%); }
    .dancer-2 { top: 20%; left: 70%; }
    .dancer-3 { top: 45%; left: 85%; }
    .dancer-4 { top: 70%; left: 70%; }
    .dancer-5 { top: 80%; left: 50%; transform: translateX(-50%); }
    .dancer-6 { top: 70%; left: 30%; }
    .dancer-7 { top: 45%; left: 15%; }
    .dancer-8 { top: 20%; left: 30%; }

    .campfire-container:hover .dancer {
      animation: dance 1.5s infinite alternate;
    }

    @keyframes fire-flicker {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    @keyframes dance {
      0% { 
        transform: translate(-50%, 0) rotate(0deg) scale(1); 
      }
      50% { 
        transform: translate(-50%, -10px) rotate(10deg) scale(1.1); 
      }
      100% { 
        transform: translate(-50%, 0) rotate(-10deg) scale(0.9); 
      }
    }


    .campfire-container:hover .dancer-1,
    .campfire-container:hover .dancer-5 {
      animation: dance-center 1.5s infinite alternate;
    }
    @keyframes dance-center {
      0% { 
        transform: translateX(-50%) rotate(0deg) scale(1); 
      }
      50% { 
        transform: translateX(-50%) translateY(-10px) rotate(10deg) scale(1.1); 
      }
      100% { 
        transform: translateX(-50%) translateY(0) rotate(-10deg) scale(0.9); 
      }
    }
  </style>
</head>
<body>
  <div class="campfire-container">
   
    <div class="campfire">Lorem</div>
    
   
    <div class="dancer dancer-1">Lorem</div>
    <div class="dancer dancer-2">Lorem</div>
    <div class="dancer dancer-3">Lorem</div>
    <div class="dancer dancer-4">Lorem</div>
    <div class="dancer dancer-5">Lorem</div>
    <div class="dancer dancer-6">Lorem</div>
    <div class="dancer dancer-7">Lorem</div>
    <div class="dancer dancer-8">Lorem</div>
  </div>
</body>
</html>
